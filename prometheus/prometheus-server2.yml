global:
  scrape_interval: 1s
  evaluation_interval: 1s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'haproxy-e'
    static_configs:
      - targets: ['haproxy-e:8404']

  - job_name: 'media-service-e'
    static_configs:
      - targets: ['media-service-e:8000']

  - job_name: 'content-service-e'
    static_configs:
      - targets: ['content-service-e:8000']

  - job_name: 'load-generator-e'
    static_configs:
      - targets: ['172.17.0.1:8011']

  - job_name: 'haproxy-f'
    static_configs:
      - targets: ['haproxy-f:8404']

  - job_name: 'media-service-f'
    static_configs:
      - targets: ['media-service-f:8000']

  - job_name: 'content-service-f'
    static_configs:
      - targets: ['content-service-f:8000']

  - job_name: 'load-generator-f'
    static_configs:
      - targets: ['172.17.0.1:8012']

  - job_name: 'haproxy-g'
    static_configs:
      - targets: ['haproxy-g:8404']

  - job_name: 'media-service-g'
    static_configs:
      - targets: ['media-service-g:8000']

  - job_name: 'content-service-g'
    static_configs:
      - targets: ['content-service-g:8000']

  - job_name: 'load-generator-g'
    static_configs:
      - targets: ['172.17.0.1:8013']

  - job_name: 'haproxy-h'
    static_configs:
      - targets: ['haproxy-h:8404']

  - job_name: 'media-service-h'
    static_configs:
      - targets: ['media-service-h:8000']

  - job_name: 'content-service-h'
    static_configs:
      - targets: ['content-service-h:8000']

  - job_name: 'load-generator-h'
    static_configs:
      - targets: ['172.17.0.1:8014']
