global:
  scrape_interval: 1s
  evaluation_interval: 1s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'haproxy-a'
    static_configs:
      - targets: ['haproxy-a:8404']

  - job_name: 'media-service-a'
    static_configs:
      - targets: ['media-service-a:8000']

  - job_name: 'content-service-a'
    static_configs:
      - targets: ['content-service-a:8000']

  - job_name: 'load-generator-a'
    static_configs:
      - targets: ['172.17.0.1:8011']

  - job_name: 'haproxy-b'
    static_configs:
      - targets: ['haproxy-b:8404']

  - job_name: 'media-service-b'
    static_configs:
      - targets: ['media-service-b:8000']

  - job_name: 'content-service-b'
    static_configs:
      - targets: ['content-service-b:8000']

  - job_name: 'load-generator-b'
    static_configs:
      - targets: ['172.17.0.1:8012']

  - job_name: 'haproxy-c'
    static_configs:
      - targets: ['haproxy-c:8404']

  - job_name: 'media-service-c'
    static_configs:
      - targets: ['media-service-c:8000']

  - job_name: 'content-service-c'
    static_configs:
      - targets: ['content-service-c:8000']

  - job_name: 'load-generator-c'
    static_configs:
      - targets: ['172.17.0.1:8013']

  - job_name: 'haproxy-d'
    static_configs:
      - targets: ['haproxy-d:8404']

  - job_name: 'media-service-d'
    static_configs:
      - targets: ['media-service-d:8000']

  - job_name: 'content-service-d'
    static_configs:
      - targets: ['content-service-d:8000']

  - job_name: 'load-generator-d'
    static_configs:
      - targets: ['172.17.0.1:8014']
