global:
  scrape_interval: 1s
  evaluation_interval: 1s


scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'haproxy'
    static_configs:
      - targets: ['haproxy:8404']

  - job_name: 'media-service'
    static_configs:
      - targets: ['media-service:8000']

  - job_name: 'content-service'
    static_configs:
      - targets: ['content-service:8000']

  - job_name: 'load-generator'
    static_configs:
      - targets: ['172.17.0.1:8001']
