global
    maxconn 256

defaults
    mode http
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms

frontend http_front
    bind *:80
    acl is_media path_beg /media
    acl is_content path_beg /content
    use_backend media_backend if is_media
    use_backend content_backend if is_content

backend media_backend
    server media1 media-service-e:8000

backend content_backend
    server content1 content-service-e:8000

frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 1s
