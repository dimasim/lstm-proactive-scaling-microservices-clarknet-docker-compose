global
    log stdout format raw local0

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  50s
    timeout server  50s

frontend stats
    bind *:8404
    http-request use-service prometheus-exporter if { path /metrics }
    stats enable
    stats uri /stats
    stats refresh 5s

frontend http_front
    bind *:80
    
    acl url_media path_beg /media
    acl url_content path_beg /content
    
    use_backend media_back if url_media
    use_backend content_back if url_content

resolvers docker
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout resolve 1s
    timeout retry   1s
    hold other      30s
    hold refused    30s
    hold nx         30s
    hold timeout    30s
    hold valid      10s
    hold obsolete   10s

backend media_back
    balance roundrobin
    server-template media 1-10 media-service-b:8000 check resolvers docker resolve-prefer ipv4

backend content_back
    balance roundrobin
    server-template content 1-10 content-service-b:8000 check resolvers docker resolve-prefer ipv4
